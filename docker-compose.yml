version: '3.9'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"Your_password123\" -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 12
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ProjectTaskManagementDb;User Id=sa;Password=Your_password123;TrustServerCertificate=true;
      - JwtSettings__Issuer=ProjectTaskManagementApi
      - JwtSettings__Audience=ProjectTaskManagementApiUsers
      - JwtSettings__Secret=ReplaceThisWithAVeryStrongSecretKey123!
      - JwtSettings__ExpirationMinutes=60
    depends_on:
      sqlserver:
        condition: service_healthy
